name: Sabocha Wealth Signal

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate_and_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Execute Wealth Well Validation
        run: python wealth_well_validator.py
        
      - name: Sophon Omega Pulse
        run: python sophon_omega_sync.py | head -n 25

name: 24h Autonomous Cycle
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  omega-cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: matlab-actions/setup-matlab@v2
      - name: Run Fusion
        env:
          MLM_LICENSE: ${{ secrets.MLM_LICENSE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: matlab -batch "run('pension_analysis.m');"

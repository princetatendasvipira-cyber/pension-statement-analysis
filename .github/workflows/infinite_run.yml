name: 24h Autonomous Cycle
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  omega-cycle:
    runs-on: ubuntu-latest
    env:
      MLM_LICENSE: ${{ secrets.MLM_LICENSE }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Quantum Sequence
        run: python3 quantum_timer.py
      - name: Install Display Driver
        run: sudo apt-get install -y xvfb
      - uses: matlab-actions/setup-matlab@v2
      - name: Run Fusion Engine
        run: xvfb-run -a matlab -batch "pension_analysis"
